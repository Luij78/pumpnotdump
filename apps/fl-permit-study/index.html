<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);

            padding: 20px;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        header p {
            opacity: 0.9;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            color: white;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 0.85em;
            opacity: 0.8;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .category-badge {
            display: inline-block;
            background: #e8f4fd;
            color: #1e3c72;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
            margin-bottom: 15px;
        }
        
        .question {
            font-size: 1.25em;
            line-height: 1.5;
            color: #333;
            margin-bottom: 25px;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .option {
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1em;
        }
        
        .option:hover {
            border-color: #1e3c72;
            background: #f8faff;
        }
        
        .option.selected {
            border-color: #1e3c72;
            background: #e8f4fd;
        }
        
        .option.correct {
            border-color: #27ae60;
            background: #d4edda;
        }
        
        .option.incorrect {
            border-color: #e74c3c;
            background: #f8d7da;
        }
        
        .option.show-correct {
            border-color: #27ae60;
            background: #d4edda;
        }
        
        .explanation {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 10px;
            display: none;
        }
        
        .explanation.show {
            display: block;
        }
        
        .explanation h4 {
            color: #856404;
            margin-bottom: 8px;
        }
        
        .explanation p {
            color: #856404;
            line-height: 1.5;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #1e3c72;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2a5298;
        }
        
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #d0d0d0;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #27ae60;
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        
        .mode-btn {
            padding: 10px 20px;
            border: 2px solid rgba(255,255,255,0.5);
            background: transparent;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .mode-btn:hover, .mode-btn.active {
            background: white;
            color: #1e3c72;
        }
        
        .complete-screen {
            text-align: center;
            padding: 40px;
        }
        
        .complete-screen h2 {
            font-size: 2em;
            margin-bottom: 20px;
            color: #333;
        }
        
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        
        .score-circle.fail {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }
        
        .score-text {
            color: white;
            font-size: 2.5em;
            font-weight: bold;
        }
        
        .complete-message {
            color: #666;
            margin-bottom: 30px;
        }
        
        footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-top: 30px;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚗 Florida Permit Study Guide</h1>
            <p>Practice for your Florida Driver's License Written Test</p>
        </header>
        
        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('study')">📚 Study Mode</button>
            <button class="mode-btn" onclick="setMode('test')">📝 Test Mode</button>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="correct-count">0</div>
                <div class="stat-label">Correct</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="total-count">0/50</div>
                <div class="stat-label">Questions</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="accuracy">0%</div>
                <div class="stat-label">Accuracy</div>
            </div>
        </div>
        
        <div class="card" id="quiz-card">
            <span class="category-badge" id="category">Loading...</span>
            <p class="question" id="question">Loading question...</p>
            <div class="options" id="options"></div>
            <div class="explanation" id="explanation">
                <h4>💡 Explanation</h4>
                <p id="explanation-text"></p>
            </div>
            <div class="buttons">
                <button class="btn btn-secondary" onclick="skipQuestion()">Skip</button>
                <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" disabled>Next Question</button>
            </div>
        </div>
        
        <div class="card complete-screen" id="complete-screen" style="display:none;">
            <h2>🎉 Quiz Complete!</h2>
            <div class="score-circle" id="score-circle">
                <span class="score-text" id="final-score">0%</span>
            </div>
            <p class="complete-message" id="complete-message">Great job studying!</p>
            <div class="buttons">
                <button class="btn btn-primary" onclick="restartQuiz()">Try Again</button>
            </div>
        </div>
        
        <footer>
            <p>Based on the Florida DHSMV Driver Handbook</p>
            <p>Built by Skipper ⚓ for the Garcia family</p>
        </footer>
    </div>

        function shuffle(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

            restartQuiz();
        }
        
        function restartQuiz() {
            currentQuestion = 0;
            correctAnswers = 0;
            answeredQuestions = 0;
            answered = false;
            shuffledQuestions = shuffle(questions);
            document.getElementById('quiz-card').style.display = 'block';
            document.getElementById('complete-screen').style.display = 'none';
            showQuestion();
            updateStats();
        }
        
        function showQuestion() {
            const q = shuffledQuestions[currentQuestion];
            document.getElementById('category').textContent = q.category;
            document.getElementById('question').textContent = q.question;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.textContent = option;
                btn.onclick = () => selectOption(index);
                optionsDiv.appendChild(btn);
            });
            
            document.getElementById('explanation').classList.remove('show');
            document.getElementById('next-btn').disabled = true;
            answered = false;
            
            updateProgress();
        }
        
        function selectOption(index) {
            if (answered) return;
            answered = true;
            answeredQuestions++;
            
            const q = shuffledQuestions[currentQuestion];
            const options = document.querySelectorAll('.option');
            
            options.forEach((opt, i) => {
                opt.classList.remove('selected');
                if (i === index) {
                    if (i === q.correct) {
                        opt.classList.add('correct');
                        correctAnswers++;
                    } else {
                        opt.classList.add('incorrect');
                        options[q.correct].classList.add('show-correct');
                    }
                }
            });
            
            if (mode === 'study') {
                document.getElementById('explanation-text').textContent = q.explanation;
                document.getElementById('explanation').classList.add('show');
            }
            
            document.getElementById('next-btn').disabled = false;
            updateStats();
        }
        
        function skipQuestion() {
            if (!answered) {
                answeredQuestions++;
                updateStats();
            }
            nextQuestion();
        }
        
        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion >= shuffledQuestions.length) {
                showComplete();
            } else {
                showQuestion();
            }
        }
        
        function showComplete() {
            document.getElementById('quiz-card').style.display = 'none';
            document.getElementById('complete-screen').style.display = 'block';
            
            const percentage = Math.round((correctAnswers / shuffledQuestions.length) * 100);
            document.getElementById('final-score').textContent = percentage + '%';
            
            const scoreCircle = document.getElementById('score-circle');
            if (percentage >= 80) {
                scoreCircle.classList.remove('fail');
                document.getElementById('complete-message').textContent = 
                    percentage >= 90 ? "Excellent! You're ready for the test! 🎉" : 
                    "Great job! Keep practicing to be even more confident!";
            } else {
                scoreCircle.classList.add('fail');
                document.getElementById('complete-message').textContent = 
                    "Keep studying! You need 80% to pass the real test.";
            }
        }
        
        function updateStats() {
            document.getElementById('correct-count').textContent = correctAnswers;
            document.getElementById('total-count').textContent = `${answeredQuestions}/${shuffledQuestions.length}`;
            const accuracy = answeredQuestions > 0 ? Math.round((correctAnswers / answeredQuestions) * 100) : 0;
            document.getElementById('accuracy').textContent = accuracy + '%';
        }
        
        function updateProgress() {
            const progress = (currentQuestion / shuffledQuestions.length) * 100;
            document.getElementById('progress').style.width = progress + '%';
        }
        
        // Initialize
        restartQuiz();
    </script>
</body>
</html>
